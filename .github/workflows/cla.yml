name: CLA Assistant
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    if: |
      (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA')
      || github.event_name == 'pull_request_target'
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_ASSISTANT_PAT }}
        with:
          path-to-signatures: "signatures/cla.json"
          path-to-document: "https://github.com/zts212653/clowder-ai/blob/main/CLA.md"
          branch: "main"
          allowlist: "zts212653,dependabot[bot],github-actions[bot]"
          remote-organization-name: ""
          remote-repository-name: ""
          create-file-commit-message: "chore: create CLA signature file"
          signed-commit-message: "chore: $contributorName signed the CLA"
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge this PR, we need you to sign our [Contributor License Agreement (CLA)](https://github.com/zts212653/clowder-ai/blob/main/CLA.md).

            To sign, please comment on this PR with:
            ```
            I have read the CLA Document and I hereby sign the CLA
            ```

            感谢你的贡献！合并前需要签署 [贡献者许可协议 (CLA)](https://github.com/zts212653/clowder-ai/blob/main/CLA.md)。请在此 PR 下评论上方英文内容即可签署。
          custom-allsigned-prcomment: "All contributors have signed the CLA. ✅"
